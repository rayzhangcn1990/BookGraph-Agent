# ═══════════════════════════════════════
# BookGraph Agent 全局配置
# ═══════════════════════════════════════

obsidian:
  vault_path: "${OBSIDIAN_VAULT_PATH}"
  graph_root: "📚 知识图谱"

  # 一级学科路径映射
  discipline_paths:
    政治学: "📚 知识图谱/政治学"
    经济学: "📚 知识图谱/经济学"
    心理学: "📚 知识图谱/心理学"
    历史学: "📚 知识图谱/历史学"
    哲学: "📚 知识图谱/哲学"
    管理学: "📚 知识图谱/管理学"
    社会学: "📚 知识图谱/社会学"
    文学: "📚 知识图谱/文学"
    科学: "📚 知识图谱/科学"
    技术: "📚 知识图谱/技术"
    思维: "📚 知识图谱/思维"

  # 二级子学科配置（可选，用于更细分分类）
  sub_discipline_paths: {}

  # 子目录结构
  subdirectories:
    books: "书籍图谱"
    discipline: "学科图谱"
    concepts: "概念词汇库"
    beginner: "入门指南"

llm:
  provider: "anthropic"
  model: "deepseek-v4-pro"
  api_base: "${ANTHROPIC_BASE_URL}"
  api_key: "${ANTHROPIC_AUTH_TOKEN}"
  max_tokens: 16384
  temperature: 0.3
  chunk_size: 25000
  merge_threshold: 15000
  max_retries: 5
  retry_delay: 10
  timeout: 240

  # 模型池配置（已禁用，直接使用配置的模型）
  model_pool:
    enabled: false
    auto_verify: false
    verify_interval: 3600
    min_stability: 0.7
    max_response_time: 30
    min_success_count: 3
    max_consecutive_failures: 3

  # 🔑 不使用多源 API，直接使用 Anthropic SDK

# llm_wiki 改进功能开关
improvements:
  # 两阶段 COT 摄取 (分析 → 生成)
  two_stage_ingest:
    enabled: true         # 启用后将替代多轮合成中的 Round1‑5
    cache_results: true   # 缓存分析阶段结果 (基于内容哈希)
  # 图洞察 (孤立节点、桥节点、稀疏社区)
  graph_insights:
    enabled: true
    degree_threshold: 1   # 度 ≤ 1 视为孤立节点
    bridge_min_communities: 3  # 连接至少 3 个社区视为桥节点
    cohesion_threshold: 0.15   # 社区凝聚力低于此值视为稀疏
  # 混合搜索 (仅在添加查询接口后生效，目前为占位)
  hybrid_search:
    enabled: false
    vector_db_path: "~/.bookgraph/vectors.lance"
    embedding_model: "text-embedding-ada-002"

batch:
  max_workers: 4

logging:
  level: "INFO"
  file: "logs/bookgraph.log"
  max_size_mb: 10

ocr:
  engine: "paddleocr"
  language: "ch"
  dpi: 300
  timeout: 300

parsing:
  supported_formats:
    - ".epub"
    - ".pdf"
    - ".mobi"
  image_pdf_threshold: 0.8
  min_text_length: 100

# 学科图谱相关 (保持不变)
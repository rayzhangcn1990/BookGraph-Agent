# ═══════════════════════════════════════
# BookGraph Agent 全局配置
# ═══════════════════════════════════════

obsidian:
  vault_path: "${OBSIDIAN_VAULT_PATH}"
  graph_root: "📚 知识图谱"

  # 一级学科路径映射
  discipline_paths:
    政治学: "📚 知识图谱/政治学"
    经济学: "📚 知识图谱/经济学"
    心理学: "📚 知识图谱/心理学"
    历史学: "📚 知识图谱/历史学"
    哲学: "📚 知识图谱/哲学"
    管理学: "📚 知识图谱/管理学"
    社会学: "📚 知识图谱/社会学"
    文学: "📚 知识图谱/文学"
    科学: "📚 知识图谱/科学"
    技术: "📚 知识图谱/技术"
    思维: "📚 知识图谱/思维"

  # 二级子学科配置（可选，用于更细分分类）
  sub_discipline_paths: {}

  # 子目录结构
  subdirectories:
    books: "书籍图谱"
    discipline: "学科图谱"
    concepts: "概念词汇库"
    beginner: "入门指南"

llm:
  # 主模型配置（使用本地代理 - 指定稳定模型）
  provider: "openai"
  model: "deepseek/deepseek-chat"  # 🔑 切换到验证可用的 DeepSeek 模型
  api_base: "http://localhost:3001/v1"
  api_key: "${FREELLMAPI_KEY}"  # 从环境变量读取，避免硬编码
  max_tokens: 8192
  temperature: 0.3
  # 🔑 语义分块配置（替代死板的 chunk_size）
  chunk_tokens: 4000      # 目标 token 数（约 16000 字符）
  chunk_size: 30000       # 回退：无章节结构时的字符数
  merge_threshold: 3000
  max_retries: 8          # 🔑 增加重试次数到 8
  retry_delay: 15         # 🔑 增加重试延迟到 15 秒（指数退避）
  timeout: 300            # 🔑 增加超时到 300 秒

  # 模型池配置 - 🔑 启用自动切换
  model_pool:
    enabled: true          # 🔑 启用模型池
    auto_verify: true
    verify_interval: 1800  # 🔑 缩短验证间隔到 30 分钟
    min_stability: 0.7
    max_response_time: 45  # 🔑 增加响应时间容忍到 45 秒
    min_success_count: 2   # 🔑 降低成功阈值到 2 次
    max_consecutive_failures: 2  # 🔑 降低连续失败阈值到 2 次
    # 可用模型列表（从 API 端点自动发现，此处仅指定优先级）
    models:
      - model: "deepseek/deepseek-chat"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 1
        verified: true      # 🔑 标记为已验证可用
      - model: "deepseek-ai/deepseek-v4-pro"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 2
      - model: "meta-llama/llama-3.3-70b-instruct:free"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 3
      - model: "nvidia/llama-3.3-nemotron-super-49b-v1"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 4
      - model: "tencent/hy3-preview:free"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 5
      - model: "minimax/minimax-m2.5:free"
        api_base: "http://localhost:3001/v1"
        api_key: "${FREELLMAPI_KEY}"
        priority: 6

  # 🔑 不使用多源 API，直接使用 Anthropic SDK

# llm_wiki 改进功能开关
improvements:
  # 两阶段 COT 摄取 (分析 → 生成)
  two_stage_ingest:
    enabled: true         # 启用后将替代多轮合成中的 Round1‑5
    cache_results: true   # 缓存分析阶段结果 (基于内容哈希)
  # 本地证据预处理：使用 NAS Ollama 小模型做短 JSON 候选信号抽取（已禁用，放弃本地 Ollama）
  local_evidence_preprocessor:
    enabled: false
    provider: "ollama"
    api_base: "http://10.108.1.143:11434"
    model: "qwen2.5:3b"
    timeout: 180
    max_chars: 1200
    num_predict: 128
    temperature: 0.0
    cache_results: true
    max_parallel: 1
  # 图洞察 (孤立节点、桥节点、稀疏社区)
  graph_insights:
    enabled: true
    degree_threshold: 1
    bridge_min_communities: 3
    cohesion_threshold: 0.15
  # 混合搜索 (仅在添加查询接口后生效，目前为占位)
  hybrid_search:
    enabled: false
    vector_db_path: "~/.bookgraph/vectors.lance"
    embedding_model: "text-embedding-ada-002"
  # 结构化输出 (强制 JSON 输出)
  structured_output:
    enabled: false          # 需要安装 instructor 库
  # 实体消歧 (合并相似概念)
  entity_resolution:
    enabled: false
    model: "BAAI/bge-small-en-v1.5"
    similarity_threshold: 0.85
  # 摘要层索引 (生成 _chapter_summary.md 和 _book_summary.md)
  summary_index:
    enabled: true

batch:
  max_workers: 4

logging:
  level: "INFO"
  file: "logs/bookgraph.log"
  max_size_mb: 10

ocr:
  engine: "paddleocr"
  language: "ch"
  dpi: 300
  timeout: 300

parsing:
  supported_formats:
    - ".epub"
    - ".pdf"
    - ".mobi"
  image_pdf_threshold: 0.8
  min_text_length: 100

# 学科图谱相关 (保持不变)
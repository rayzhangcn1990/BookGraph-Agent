# ═══════════════════════════════════════
# BookGraph Agent 全局配置
# ═══════════════════════════════════════

obsidian:
  vault_path: "${OBSIDIAN_VAULT_PATH}"
  graph_root: "📚 知识图谱"

  # 一级学科路径映射
  discipline_paths:
    政治学: "📚 知识图谱/政治学"
    经济学: "📚 知识图谱/经济学"
    心理学: "📚 知识图谱/心理学"
    历史学: "📚 知识图谱/历史学"
    哲学: "📚 知识图谱/哲学"
    管理学: "📚 知识图谱/管理学"
    社会学: "📚 知识图谱/社会学"
    文学: "📚 知识图谱/文学"
    科学: "📚 知识图谱/科学"
    技术: "📚 知识图谱/技术"
    思维: "📚 知识图谱/思维"

  # 二级子学科配置（可选，用于更细分分类）
  sub_discipline_paths: {}

  # 子目录结构
  subdirectories:
    books: "书籍图谱"
    discipline: "学科图谱"
    concepts: "概念词汇库"
    beginner: "入门指南"

llm:
  # 主模型配置（使用本地代理 - 指定稳定模型）
  provider: "openai"
  model: "astron-code-latest"  # 🔑 切换到验证可用的 DeepSeek 模型
  api_base: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
  api_key: "${FREELLMAPI_KEY}"  # 从环境变量读取，避免硬编码
  max_tokens: 8192
  temperature: 0.3
  # 🔑 语义分块配置（替代死板的 chunk_size）
  chunk_tokens: 4000      # 目标 token 数（约 16000 字符）
  chunk_size: 30000       # 回退：无章节结构时的字符数
  merge_threshold: 3000
  max_retries: 8          # 🔑 增加重试次数到 8
  retry_delay: 15         # 🔑 增加重试延迟到 15 秒（指数退避）
  timeout: 300            # 🔑 增加超时到 300 秒
  max_parallel: 8         # 🔑 最大并行 chunk 处理数（命令行可覆盖）

  # ponytail: 禁用模型池，仅使用 astron-code-latest 单模型
  model_pool:
    enabled: false         # 🔑 禁用模型池自动切换
    # models 配置已注释，避免模型池启用时干扰

  # 🔑 不使用多源 API，直接使用 Anthropic SDK

# llm_wiki 改进功能开关
improvements:
  # 两阶段 COT 摄取 (分析 → 生成)
  two_stage_ingest:
    enabled: true         # 启用后将替代多轮合成中的 Round1‑5
    cache_results: true   # 缓存分析阶段结果 (基于内容哈希)
  # 本地证据预处理：已禁用（放弃本地 Ollama，统一使用远程模型池）
  # local_evidence_preprocessor 配置已移除，避免残留配置干扰
  # 图洞察 (孤立节点、桥节点、稀疏社区)
  graph_insights:
    enabled: true
    degree_threshold: 1
    bridge_min_communities: 3
    cohesion_threshold: 0.15
  # 混合搜索 (仅在添加查询接口后生效，目前为占位)
  hybrid_search:
    enabled: false
    vector_db_path: "~/.bookgraph/vectors.lance"
    embedding_model: "text-embedding-ada-002"
  # 结构化输出 (强制 JSON 输出)
  structured_output:
    enabled: true           # 使用 OpenAI response_format 强制 JSON 输出
  # 四种摘要策略 (hierarchical/thematic/adaptive/critical)
  summarization_strategy:
    enabled: true
    default_strategy: "adaptive"  # 默认自动选择策略
    # 可选值: hierarchical, thematic, adaptive, critical
  # 实体消歧 (合并相似概念)
  entity_resolution:
    enabled: false
    model: "BAAI/bge-small-en-v1.5"
    similarity_threshold: 0.85
  # 摘要层索引 (生成 _chapter_summary.md 和 _book_summary.md)
  summary_index:
    enabled: true

  # 质量校验强化 (P1优化)
  quality_gate:
    enabled: true
    threshold: 80.0              # 质量分数阈值（低于80分自动回退）
    auto_retry: true             # 自动重试机制（发现质量问题立即重试）
    max_retries: 3               # 自动重试次数

  # 全局并发池配置 (P0优化)
  global_concurrency:
    enabled: true
    max_workers: 4               # 全局最大并发数（多书并行时不超过此值）
    dynamic_adjustment: true     # 动态并发度调整（根据限流状态自适应）
    recovery_threshold: 10      # 连续成功10次后恢复并发度

  # JSON知识库配置 (P0优化)
  json_knowledge_base:
    enabled: true
    db_path: ".cache/knowledge_base.json"

  # 导出器配置 (P2优化)
  exporters:
    enabled: true
    mindmap:
      enabled: true              # 思维导图导出 (Mermaid格式)
    json:
      enabled: true              # JSON结构化导出

batch:
  max_workers: 4

logging:
  level: "INFO"
  file: "logs/bookgraph.log"
  max_size_mb: 10

ocr:
  engine: "paddleocr"
  language: "ch"
  dpi: 300
  timeout: 300

parsing:
  supported_formats:
    - ".epub"
    - ".pdf"
    - ".mobi"
  image_pdf_threshold: 0.8
  min_text_length: 100

# 学科图谱相关 (保持不变)
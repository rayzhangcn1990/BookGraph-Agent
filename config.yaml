# ═══════════════════════════════════════
# BookGraph Agent 全局配置
# ═══════════════════════════════════════

obsidian:
  vault_path: "${OBSIDIAN_VAULT_PATH}"
  graph_root: "📚 知识图谱"

  # 一级学科路径映射
  discipline_paths:
    政治学: "📚 知识图谱/政治学"
    经济学: "📚 知识图谱/经济学"
    心理学: "📚 知识图谱/心理学"
    历史学: "📚 知识图谱/历史学"
    哲学: "📚 知识图谱/哲学"
    管理学: "📚 知识图谱/管理学"
    社会学: "📚 知识图谱/社会学"
    文学: "📚 知识图谱/文学"
    科学: "📚 知识图谱/科学"
    技术: "📚 知识图谱/技术"
    思维: "📚 知识图谱/思维"

  # 二级子学科配置（可选，用于更细分分类）
  sub_discipline_paths: {}

  # 子目录结构
  subdirectories:
    books: "书籍图谱"
    discipline: "学科图谱"
    concepts: "概念词汇库"
    beginner: "入门指南"

llm:
  provider: "nvidia-nim"
  model: "nvidia/llama-3.3-nemotron-super-49b-v1"
  api_base: "${NVIDIA_NIM_API_BASE}"
  api_key: "${NVIDIA_NIM_API_KEY}"
  max_tokens: 16384
  temperature: 0.3
  chunk_size: 25000
  merge_threshold: 15000
  max_retries: 5
  retry_delay: 10
  timeout: 240

  # 模型池配置
  model_pool:
    enabled: true
    auto_verify: true
    verify_interval: 3600
    min_stability: 0.7
    max_response_time: 30
    min_success_count: 3
    max_consecutive_failures: 3

  # NVIDIA NIM API 可用模型
  available_models:
    - model: "nvidia/llama-3.3-nemotron-super-49b-v1"
      api_base: "${NVIDIA_NIM_API_BASE}"
      api_key: "${NVIDIA_NIM_API_KEY}"
      priority: 1
    - model: "meta/llama-3.1-405b-instruct"
      api_base: "${NVIDIA_NIM_API_BASE}"
      api_key: "${NVIDIA_NIM_API_KEY}"
      priority: 2
    - model: "qwen/qwen3-coder-480b-a35b-instruct"
      api_base: "${NVIDIA_NIM_API_BASE}"
      api_key: "${NVIDIA_NIM_API_KEY}"
      priority: 3

  api_sources:
    # 首选：NVIDIA NIM API
    - name: "nvidia-nim-direct"
      api_base: "${NVIDIA_NIM_API_BASE}"
      api_key: "${NVIDIA_NIM_API_KEY}"
      priority: 1
      quota_type: "independent"
      preferred_models:
        - "nvidia/llama-3.3-nemotron-super-49b-v1"
        - "meta/llama-3.1-405b-instruct"
        - "qwen/qwen3-coder-480b-a35b-instruct"

    # 备用：本地代理
    - name: "nvidia-nim-local"
      api_base: "http://localhost:18765/v1"
      api_key: "unused"
      priority: 2
      quota_type: "shared"

    # OpenRouter（独立额度）
    - name: "openrouter"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_API_KEY}"
      priority: 3
      quota_type: "independent"

    - name: "openrouter-gemini"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_GEMINI_API_KEY}"
      priority: 2
      quota_type: "independent"
      preferred_models:
        - "openai/gpt-oss-120b:free"
        - "nousresearch/hermes-3-llama-3.1-405b:free"

    - name: "openrouter-nvidia"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_NVIDIA_API_KEY}"
      priority: 2
      quota_type: "independent"
      preferred_models:
        - "openai/gpt-oss-120b:free"
        - "minimax/minimax-m2.5:free"

    - name: "openrouter-dashscope"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_DASHSCOPE_API_KEY}"
      priority: 2
      quota_type: "independent"
      preferred_models:
        - "nousresearch/hermes-3-llama-3.1-405b:free"
        - "minimax/minimax-m2.5:free"

    - name: "openrouter-main"
      api_base: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_MAIN_API_KEY}"
      priority: 2
      quota_type: "independent"
      preferred_models:
        - "openai/gpt-oss-120b:free"
        - "nousresearch/hermes-3-llama-3.1-405b:free"

batch:
  max_workers: 4

logging:
  level: "INFO"
  file: "logs/bookgraph.log"
  max_size_mb: 10

ocr:
  engine: "paddleocr"
  language: "ch"
  dpi: 300
  timeout: 300

parsing:
  supported_formats:
    - ".epub"
    - ".pdf"
    - ".mobi"
  image_pdf_threshold: 0.8
  min_text_length: 100
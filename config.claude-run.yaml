llm:
  provider: "anthropic"
  model: "gpt-5.4"
  api_base: "https://aiapi.aisonnet.org"
  api_key: "${ANTHROPIC_AUTH_TOKEN}"
  max_tokens: 16384
  temperature: 0.3
  chunk_size: 25000
  merge_threshold: 15000
  max_retries: 5
  retry_delay: 10
  timeout: 240
  model_pool:
    enabled: false
obsidian:
  vault_path: "${OBSIDIAN_VAULT_PATH}"
  graph_root: "📚 知识图谱"
  discipline_paths:
    哲学: "📚 知识图谱/哲学"
  sub_discipline_paths: {}
  subdirectories:
    books: "书籍图谱"
    discipline: "学科图谱"
    concepts: "概念词汇库"
    beginner: "入门指南"
improvements:
  two_stage_ingest:
    enabled: true
    cache_results: true
  graph_insights:
    enabled: true
    degree_threshold: 1
    bridge_min_communities: 3
    cohesion_threshold: 0.15
  hybrid_search:
    enabled: false
    vector_db_path: "~/.bookgraph/vectors.lance"
    embedding_model: "text-embedding-ada-002"
  structured_output:
    enabled: false
  entity_resolution:
    enabled: false
    model: "BAAI/bge-small-en-v1.5"
    similarity_threshold: 0.85
  summary_index:
    enabled: true
batch:
  max_workers: 3
logging:
  level: "INFO"
  file: "logs/bookgraph.log"
  max_size_mb: 10
ocr:
  engine: "paddleocr"
  language: "ch"
  dpi: 300
  timeout: 300
parsing:
  supported_formats:
    - ".epub"
    - ".pdf"
    - ".mobi"
  image_pdf_threshold: 0.8
  min_text_length: 100

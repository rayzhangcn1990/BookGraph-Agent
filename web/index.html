<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookGraph-Agent Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #667eea;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
        }

        .upload-icon {
            font-size: 64px;
            color: #667eea;
        }

        .upload-text {
            font-size: 18px;
            color: #666;
            margin-top: 16px;
        }

        .upload-input {
            display: none;
        }

        .task-list {
            margin-top: 20px;
        }

        .task-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-item.completed {
            border-color: #4caf50;
            background: #f1f8f4;
        }

        .task-item.failed {
            border-color: #f44336;
            background: #ffebee;
        }

        .task-item.processing {
            border-color: #ff9800;
            background: #fff3e0;
        }

        .task-info {
            flex: 1;
        }

        .task-id {
            font-size: 14px;
            color: #999;
        }

        .task-book {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-top: 4px;
        }

        .task-status {
            text-align: right;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: #e0e0e0;
            color: #666;
        }

        .status-processing {
            background: #ff9800;
            color: white;
        }

        .status-completed {
            background: #4caf50;
            color: white;
        }

        .status-failed {
            background: #f44336;
            color: white;
        }

        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .button {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .button-primary {
            background: #667eea;
            color: white;
        }

        .button-primary:hover {
            background: #764ba2;
        }

        .button-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .button-secondary:hover {
            background: #d0d0d0;
        }

        .form-group {
            margin: 16px 0;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 16px;
            opacity: 0.9;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 BookGraph-Agent</h1>
            <p>智能书籍解析与知识图谱生成系统</p>
        </div>

        <!-- 统计面板 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-label">成功率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgDuration">0s</div>
                <div class="stat-label">平均耗时</div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="card">
            <div class="card-title">📤 上传书籍</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    点击上传或拖拽文件到此处<br>
                    支持 PDF、EPUB、MOBI 格式
                </div>
                <input type="file" class="upload-input" id="uploadInput" accept=".pdf,.epub,.mobi" multiple>
            </div>

            <!-- 参数配置 -->
            <div class="form-group">
                <label class="form-label">学科分类</label>
                <select class="form-select" id="disciplineSelect">
                    <option value="">自动识别</option>
                    <option value="哲学">哲学</option>
                    <option value="政治学">政治学</option>
                    <option value="经济学">经济学</option>
                    <option value="心理学">心理学</option>
                    <option value="历史学">历史学</option>
                    <option value="管理学">管理学</option>
                    <option value="社会学">社会学</option>
                    <option value="文学">文学</option>
                    <option value="科学">科学</option>
                    <option value="技术">技术</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">并发数</label>
                <input type="number" class="form-input" id="parallelInput" value="4" min="1" max="16">
            </div>

            <button class="button button-primary" id="submitBtn" style="width: 100%; margin-top: 20px;">
                开始解析
            </button>
        </div>

        <!-- 任务列表 -->
        <div class="card">
            <div class="card-title">📋 任务列表</div>
            <div class="task-list" id="taskList">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">任务详情</div>
                <div class="modal-close" id="modalClose">×</div>
            </div>
            <div id="modalBody">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL
        const API_BASE = window.location.origin;

        // 当前任务列表
        let tasks = [];

        // 上传文件列表
        let uploadedFiles = [];

        // ===== 上传逻辑 =====

        const uploadArea = document.getElementById('uploadArea');
        const uploadInput = document.getElementById('uploadInput');

        uploadArea.addEventListener('click', () => uploadInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        uploadInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            uploadedFiles = Array.from(files);
            const text = uploadedFiles.map(f => f.name).join('<br>');
            document.querySelector('.upload-text').innerHTML = `已选择 ${uploadedFiles.length} 个文件：<br>${text}`;
        }

        // ===== 提交任务 =====

        document.getElementById('submitBtn').addEventListener('click', async () => {
            if (uploadedFiles.length === 0) {
                alert('请先上传书籍文件');
                return;
            }

            const discipline = document.getElementById('disciplineSelect').value;
            const parallel = document.getElementById('parallelInput').value;

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="loading-spinner"></span> 提交中...';
            btn.disabled = true;

            try {
                // 模拟文件路径（实际需服务器处理）
                for (const file of uploadedFiles) {
                    const response = await fetch(`${API_BASE}/api/v1/parse`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            book_path: file.name, // 实际需上传到服务器
                            discipline: discipline,
                            config: {
                                llm: {max_parallel: parseInt(parallel)}
                            }
                        })
                    });

                    const data = await response.json();
                    tasks.push({
                        id: data.task_id,
                        book: file.name,
                        status: 'pending',
                        progress: 0,
                        created_at: data.created_at
                    });
                }

                updateTaskList();
                uploadedFiles = [];
                document.querySelector('.upload-text').innerHTML = '点击上传或拖拽文件到此处<br>支持 PDF、EPUB、MOBI 格式';

            } catch (error) {
                alert('提交失败: ' + error.message);
            }

            btn.innerHTML = '开始解析';
            btn.disabled = false;
        });

        // ===== 任务轮询 =====

        async function pollTaskStatus() {
            for (const task of tasks) {
                if (task.status === 'completed' || task.status === 'failed') {
                    continue;
                }

                try {
                    const response = await fetch(`${API_BASE}/api/v1/status/${task.id}`);
                    const data = await response.json();

                    task.status = data.status;
                    task.progress = data.progress || 0;
                    task.message = data.message;
                    task.updated_at = data.updated_at;

                } catch (error) {
                    console.error('轮询失败:', task.id, error);
                }
            }

            updateTaskList();
            updateStats();
        }

        // 每 5 秒轮询一次
        setInterval(pollTaskStatus, 5000);

        // ===== UI 更新 =====

        function updateTaskList() {
            const taskList = document.getElementById('taskList');

            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="text-align: center; color: #999;">暂无任务</p>';
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status}">
                    <div class="task-info">
                        <div class="task-id">ID: ${task.id}</div>
                        <div class="task-book">${task.book}</div>
                    </div>
                    <div class="task-status">
                        <div class="status-badge status-${task.status}">
                            ${task.status === 'processing' ? '处理中' : task.status}
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${task.progress * 100}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const successRate = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('successRate').textContent = `${successRate}%`;

            // 平均耗时需从结果获取
            const avgDuration = '0s';
            document.getElementById('avgDuration').textContent = avgDuration;
        }

        // ===== 模态框 =====

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('detailModal').classList.remove('active');
        });

        // 初始化
        updateTaskList();
        updateStats();
    </script>
</body>
</html>

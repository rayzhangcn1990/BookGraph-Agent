# 正则模式配置（用于实体识别）
regex_patterns:
  person_pattern: "[一-龥]{2,4}(说|认为|提出|指出|写道)"
  book_pattern: "《([^》]+)》"
  year_pattern: "\\d{4}年"
  period_pattern: "(古代|近代|现代|当代)"